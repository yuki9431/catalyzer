name: Build

on:
  push:
    branches: [main]
    paths-ignore:
      - "infra/app/Pulumi.*.yaml"
      - ".github/workflows/deploy.yml"
      - ".github/workflows/deploy-prod.yml"
  workflow_dispatch:

jobs:
  check-deploy-label:
    runs-on: ubuntu-latest
    outputs:
      no-deploy: ${{ steps.check.outputs.no-deploy }}
    steps:
      - name: Check merged PR labels
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "no-deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # コミットメッセージからPR番号を取得（squash mergeでも確実に取れる）
          COMMIT_MSG=$(gh api \
            "repos/${{ github.repository }}/commits/${{ github.sha }}" \
            --jq '.commit.message' 2>/dev/null || echo "")
          PR_NUMBER=$(echo "$COMMIT_MSG" | grep -o '(#[0-9]*)' | grep -o '[0-9]*' | head -1)

          # コミットメッセージから取れない場合はAPIフォールバック
          if [ -z "$PR_NUMBER" ]; then
            PR_NUMBER=$(gh api \
              "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
              --jq '.[0].number' 2>/dev/null || echo "")
          fi

          if [ -z "$PR_NUMBER" ]; then
            echo "no-deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LABELS=$(gh api \
            "repos/${{ github.repository }}/issues/${PR_NUMBER}/labels" \
            --jq '.[].name' 2>/dev/null || echo "")

          if echo "$LABELS" | grep -q "^no-deploy$"; then
            echo "no-deploy=true" >> "$GITHUB_OUTPUT"
            echo "Skipping build: no-deploy label found on PR #${PR_NUMBER}"
          else
            echo "no-deploy=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-deploy-label
    if: needs.check-deploy-label.outputs.no-deploy != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      actions: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: infra/app
        run: npm ci

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Build and push image
        run: |
          IMAGE="${{ secrets.IMAGE_URI }}:${{ github.sha }}"
          gcloud builds submit --tag "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Update Pulumi config with new image
        working-directory: infra/app
        run: |
          pulumi login gs://${{ secrets.PULUMI_STATE_BUCKET }}
          pulumi stack select stg
          pulumi config set exvs-app:image "$IMAGE" --secret

      - name: Commit updated Pulumi config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/app/Pulumi.stg.yaml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "CHANGED=false" >> "$GITHUB_ENV"
          else
            git commit -m "ci: update stg image to ${{ github.sha }}"
            git push
            echo "CHANGED=true" >> "$GITHUB_ENV"
          fi

      - name: Trigger deploy workflow
        if: env.CHANGED == 'true'
        run: |
          gh workflow run deploy.yml \
            --ref "${{ github.ref_name }}" \
            -f environment="stg"
        env:
          GH_TOKEN: ${{ github.token }}
