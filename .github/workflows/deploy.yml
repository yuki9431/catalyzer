name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "infra/app/Pulumi.prod.yaml"
      - "infra/app/Pulumi.stg.yaml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy target environment"
        required: true
        default: "stg"
        type: choice
        options:
          - stg
          - prod

jobs:
  detect-environment:
    runs-on: ubuntu-latest
    outputs:
      environments: ${{ steps.detect.outputs.environments }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect changed environments
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo 'environments=["${{ inputs.environment }}"]' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ENVS="[]"
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- infra/app/Pulumi.*.yaml || echo "")

          if echo "$CHANGED" | grep -q "Pulumi.stg.yaml"; then
            ENVS=$(echo "$ENVS" | jq -c '. + ["stg"]')
          fi
          if echo "$CHANGED" | grep -q "Pulumi.prod.yaml"; then
            ENVS=$(echo "$ENVS" | jq -c '. + ["prod"]')
          fi

          echo "environments=$ENVS" >> "$GITHUB_OUTPUT"
          echo "Detected environments: $ENVS"

  deploy:
    needs: detect-environment
    if: needs.detect-environment.outputs.environments != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        environment: ${{ fromJson(needs.detect-environment.outputs.environments) }}
      max-parallel: 1
    env:
      # 起動時のバージョン確認HTTPリクエストを省略（CIでは通知不要）
      PULUMI_SKIP_UPDATE_CHECK: "true"
      # 中間state checkpointの書き込みを省き最終stateのみ書く（v3.104.0以降は
      # PULUMI_EXPERIMENTAL不要）。速度と引き換えに、up途中でプロセスが異常終了
      # すると中間stateが未書き込みになる耐久性トレードオフあり
      PULUMI_SKIP_CHECKPOINTS: "true"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: infra/app
        run: npm ci

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Deploy with Pulumi
        working-directory: infra/app
        run: |
          pulumi login gs://${{ secrets.PULUMI_STATE_BUCKET }}
          pulumi stack select "${{ matrix.environment }}"
          pulumi up --yes --skip-preview
