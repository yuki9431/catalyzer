version: "2"

linters:
  default: standard
  enable:
    - bodyclose
    - nilerr
  settings:
    errcheck:
      check-blank: false
    govet:
      enable-all: true
      disable:
        - fieldalignment
    staticcheck:
      checks:
        - "all"
        - "-SA1029"
  exclusions:
    paths:
      - vendor

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
